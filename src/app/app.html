<main class="w-screen h-[100dvh] relative overflow-hidden bg-gray-50">
  @defer (on idle) {
    <!-- Referência #mapa para que o formulário possa disparar o recarregamento -->
    <app-mapa #mapa></app-mapa>
    <!-- Evento (alertaRegistrado) capturado para atualizar os pontos no mapa -->
    <app-formulario-alerta (alertaRegistrado)="mapa.recarregarPontos()"></app-formulario-alerta>
  } @placeholder {
    <div class="flex flex-col items-center justify-center h-full gap-4 text-gray-400">
      <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="font-bold uppercase tracking-widest animate-pulse">Iniciando Monitoramento...</p>
    </div>
  }
  
  <header class="absolute top-4 left-4 z-[1000] bg-white p-3 rounded shadow-md border-l-4 border-blue-600 pointer-events-none">
    <h1 class="text-xl font-bold text-gray-800 leading-tight">Monitora Urbano</h1>
    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Mapeamento DF: ODS 3 e 15</p>
  </header>

  <!-- Legenda de Cores -->
  <aside class="absolute top-4 right-4 z-[1000] bg-white/90 backdrop-blur-sm p-3 rounded-lg shadow-sm border border-gray-100 pointer-events-none hidden sm:block">
    <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-2">Legenda de Alertas</h2>
    <ul class="space-y-1.5">
      <li class="flex items-center gap-2 text-[11px] font-medium text-gray-700">
        <span class="w-2.5 h-2.5 rounded-full bg-[#ef4444] border border-white"></span> Buracos
      </li>
      <li class="flex items-center gap-2 text-[11px] font-medium text-gray-700">
        <span class="w-2.5 h-2.5 rounded-full bg-[#eab308] border border-white"></span> Iluminação
      </li>
      <li class="flex items-center gap-2 text-[11px] font-medium text-gray-700">
        <span class="w-2.5 h-2.5 rounded-full bg-[#f97316] border border-white"></span> Calçadas
      </li>
      <li class="flex items-center gap-2 text-[11px] font-medium text-gray-700">
        <span class="w-2.5 h-2.5 rounded-full bg-[#22c55e] border border-white"></span> Mato Alto
      </li>
    </ul>
  </aside>
</main>
